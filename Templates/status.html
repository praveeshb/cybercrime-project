<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Complaint Status</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
<h2>📋 Your Complaint Status</h2>
<div class="table-wrapper">
<table>
<tr>
<th>ID</th>
<th>Your Name</th>
<th>Description</th>
<th class="status-col">Status</th>
<th>Evidence</th>
</tr>
{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td><span class="status-badge status-{{row[3].lower()}}">{{row[3]}}</span></td>
<td>{{row[4]}}</td>
</tr>
{% endfor %}
</table>
</div>
<a href="/dashboard" class="btn btn-secondary">← Back to Dashboard</a>
</div>
</body>
</html>
