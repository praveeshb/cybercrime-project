<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Police Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
<h2>🚔 Police Dashboard - Cyber Crime Reports</h2>
<div class="admin-stats">
<p>Total Reports: <strong>{{data|length}}</strong></p>
</div>
<div class="table-wrapper">
<table class="admin-table">
<tr>
<th>ID</th>
<th>Reporter Name</th>
<th>Incident Description</th>
<th class="status-col">Status</th>
<th>Evidence File</th>
</tr>
{% for row in data %}
<tr>
<td>#{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2][:50]}}...</td>
<td><span class="status-badge status-{{row[3].lower()}}">{{row[3]}}</span></td>
<td>{{row[4]}}</td>
</tr>
{% endfor %}
</table>
</div>
<a href="/" class="btn btn-secondary">← Exit</a>
</div>
</body>
</html>
