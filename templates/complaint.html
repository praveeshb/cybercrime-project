<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Complaint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 0;
        }
        .complaint-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h2 {
            color: #667eea;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: 600;
            color: #333;
        }
        input, textarea, select {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            font-size: 1rem;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="complaint-container">
        <h2>📝 Submit Cybercrime Complaint</h2>
        <form method="POST">
            <div class="form-group">
                <label for="description">Complaint Description</label>
                <textarea name="description" id="description" placeholder="Describe the cybercrime incident in detail" required></textarea>
            </div>

            <div class="form-group">
                <label for="dept_id">Police Department</label>
                <select name="dept_id" id="dept_id" required>
                    <option value="">Select a Department</option>
                    <option value="1">Cybercrime Division</option>
                    <option value="2">Fraud Department</option>
                    <option value="3">Hacking Division</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Submit Complaint</button>
        </form>

        <hr>
        <a href="/dashboard" class="btn btn-secondary mt-3">← Back to Dashboard</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
