<!DOCTYPE html>
<html>
<head>
<title>Submit Complaint</title>
<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>

<body>

<div class="container">

<h2>Submit Cyber Crime Complaint</h2>

<p>Your account information will be automatically included with this complaint.</p>

<form method="POST" enctype="multipart/form-data">

<textarea name="description" placeholder="Describe the cyber crime incident..." style="width:90%;height:120px;" required></textarea>

<br><br>

<input type="file" name="evidence" accept="image/*,application/pdf" style="width:90%;">

<br><br>

<button type="submit">Submit Complaint</button>

</form>

<p><a href="/user_dashboard">Back to Dashboard</a></p>

</div>

</body>
</html>
