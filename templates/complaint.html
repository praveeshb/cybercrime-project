<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>File Complaint</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
<div class="form-wrapper">
<h2>📝 Submit Cyber Crime Complaint</h2>
<form method="POST" enctype="multipart/form-data">

<input type="text" name="name" placeholder="Your Name" required><br><br>

<input type="text" name="crime" placeholder="Crime Type"><br><br>

<textarea name="description" placeholder="Complaint"></textarea><br><br>

<input type="file" name="evidence"><br><br>

<button type="submit">Submit Complaint</button>

</form>
</div>
</div>
</body>
</html>
