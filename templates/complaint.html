<!DOCTYPE html>
<html>
<head>
<title>Submit Complaint</title>
<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>

<body>

<div class="container">

<h2>Submit Cyber Crime Complaint</h2>

<form method="POST" enctype="multipart/form-data">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<input type="tel" name="phone" placeholder="Your Phone Number" required>

<textarea name="description" placeholder="Describe the cyber crime incident..." style="width:90%;height:120px;" required></textarea>

<br><br>

<input type="file" name="evidence" accept="image/*,application/pdf" style="width:90%;">

<br><br>

<button type="submit">Submit Complaint</button>

</form>

<p><a href="/">Back to Login</a></p>

</div>

</body>
</html>
