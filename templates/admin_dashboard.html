<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>

<body>

<div class="nav">
<a href="/logout">Logout</a>
</div>

<h2>Admin Dashboard</h2>

<h3>Registered Users</h3>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Password</th>
</tr>

{% for u in users %}

<tr>
<td>{{u[0]}}</td>
<td>{{u[1]}}</td>
<td>{{u[2]}}</td>
<td>{{u[3]}}</td>
</tr>

{% endfor %}

</table>

<h3>Complaints</h3>

<table>

<tr>
<th>ID</th>
<th>Tracking ID</th>
<th>User</th>
<th>Description</th>
<th>Status</th>
</tr>

{% for c in complaints %}

<tr>
<td>{{c[0]}}</td>
<td>{{c[1]}}</td>
<td>{{c[2]}}</td>
<td>{{c[3]}}</td>
<td>{{c[5]}}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
