<!DOCTYPE html>
<html>
<head>
<title>Police Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>

<body>

<div class="nav">
<a href="/logout">Logout</a>
</div>

<h2>Police Investigation Dashboard</h2>

<table>

<tr>
<th>Complaint ID</th>
<th>Tracking ID</th>
<th>User Name</th>
<th>Description</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for c in complaints %}

<tr>
<td>{{c[0]}}</td>
<td>{{c[5]}}</td>
<td>{{c[6]}}</td>
<td>{{c[2][:50]}}...</td>
<td>Pending</td>

<td>
<form method="POST" action="/update_status/{{c[0]}}" style="display:inline;">
<select name="progress" required>
<option value="">Select Status</option>
<option value="Pending">Pending</option>
<option value="In Progress">In Progress</option>
<option value="Resolved">Resolved</option>
<option value="Rejected">Rejected</option>
</select>
<button type="submit">Update</button>
</form>
</td>

</tr>

{% endfor %}

{% if not complaints %}
<tr>
<td colspan="6">No complaints assigned to your department</td>
</tr>
{% endif %}

</table>

</body>
</html>
