<!DOCTYPE html>
<html>

<head>
<title>Police Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Police Complaint Dashboard</h1>

<table border="1">

<tr>
<th>ID</th>
<th>Crime</th>
<th>Description</th>
<th>Status</th>
</tr>

{% for c in complaints %}

<tr>
<td>{{c[0]}}</td>
<td>{{c[1]}}</td>
<td>{{c[2]}}</td>
<td>{{c[4]}}</td>
</tr>

{% endfor %}

</table>

</body>

</html>
