<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Police Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
<h2>Police Complaint Panel</h2>

<table border="1">
<tr>
<th>Tracking ID</th>
<th>User</th>
<th>Description</th>
<th>Status</th>
</tr>

{% for c in complaints %}

<tr>
<td>{{c[1]}}</td>
<td>{{c[2]}}</td>
<td>{{c[3]}}</td>
<td>{{c[4]}}</td>
</tr>

{% endfor %}

</table>
<a href="/admin" class="btn btn-secondary">← Back to Admin</a>
</div>
</body>
</html>
