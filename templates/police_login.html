<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Police Login</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
<div class="form-wrapper admin-form">
<h2>🚔 Police Login</h2>
<p class="admin-notice">⚠️ Restricted Access - Authorized Personnel Only</p>
<form action="/police_login" method="POST">
<div class="form-group">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit" class="btn btn-primary">🚔 Login to Dashboard</button>
</form>
<p><a href="/">← Back to Home</a></p>
</div>
</div>
</body>
</html>
