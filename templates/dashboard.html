<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 0;
        }
        .dashboard-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }
        .dashboard-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .dashboard-card a {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s;
            margin: 10px;
        }
        .dashboard-card a:hover {
            transform: scale(1.05);
        }
        .dashboard-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .logout-btn {
            text-align: center;
            margin-top: 30px;
        }
        .logout-btn a {
            display: inline-block;
            padding: 12px 30px;
            background: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .logout-btn a:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>📊 User Dashboard</h1>

        <div class="dashboard-info">
            <p class="mb-0"><strong>Welcome back!</strong> You are logged in to the Cybercrime Complaint Portal.</p>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="dashboard-card">
                    <h3>📝 File New Complaint</h3>
                    <p>Report a new cybercrime incident</p>
                    <a href="/complaint" class="btn btn-primary">Go to Complaint Form</a>
                </div>
            </div>

            <div class="col-md-6">
                <div class="dashboard-card">
                    <h3>📋 Check Complaint Status</h3>
                    <p>Track the status of your complaints</p>
                    <a href="/status" class="btn btn-info">View Status</a>
                </div>
            </div>
        </div>

        <div class="logout-btn">
            <a href="/logout">🚪 Logout</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
