<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h2 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        input {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 12px;
            font-size: 1rem;
            width: 100%;
        }
        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .text-center {
            text-align: center;
            margin-top: 20px;
        }
        .text-center a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .text-center a:hover {
            text-decoration: underline;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
        }
        .login-links {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .login-links a {
            flex: 1;
            display: block;
            text-align: center;
            padding: 10px;
            background: #f0f0f0;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.3s;
        }
        .login-links a:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔑 User Login</h2>
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <div class="text-center">
            <p>Don't have an account? <a href="/register">Register here</a></p>
        </div>

        <div class="divider">
            <small style="color: #999;">Other Logins:</small>
        </div>

        <div class="login-links">
            <a href="/admin_login">👨‍💼 Admin</a>
            <a href="/police_login">👮 Police</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
